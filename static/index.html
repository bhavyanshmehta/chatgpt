<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Clone</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Markdown & Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <button class="new-chat-btn" id="new-chat-btn">+ New Chat</button>
            <div class="history-list" id="history-list">
                <!-- Chat history items will be populated here -->
            </div>
            <div class="sidebar-footer">
                <button class="theme-toggle-btn" id="theme-toggle-btn">
                    <span class="theme-icon" id="theme-icon">☀️</span>
                    <span class="theme-text" id="theme-text">Light Mode</span>
                </button>
            </div>
            <div class="user-profile">
                <div class="avatar">U</div>
                <div class="user-info">User</div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div class="chat-header">
                <h2>ChatGPT Clone</h2>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="welcome-message" id="welcome-message">
                    <h1>How can I help you today?</h1>
                </div>
                <!-- Dynamic messages go here -->
            </div>
            
            <div class="chat-input-container">
                <div class="image-preview-container" id="image-preview-container" style="display: none;">
                    <img id="image-preview" src="" alt="Preview">
                    <button id="remove-image-btn" class="remove-image-btn" title="Remove image">×</button>
                </div>
                <div class="input-wrapper">
                    <button id="upload-btn" class="upload-btn" title="Attach image">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                        </svg>
                    </button>
                    <input type="file" id="file-input" accept="image/*" style="display: none;">
                    <textarea id="message-input" placeholder="Message ChatGPT..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn" disabled>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="send-icon">
                            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <div class="footer-text">
                    ChatGPT Clone can make mistakes. Consider verifying important information.
                </div>
            </div>
        </main>
    </div>
    <script src="/static/script.js?v=2"></script>
</body>
</html>
